<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Miner 2026</title>
    <style>
        /* Ajustado para permitir rolagem se a loja crescer muito */
        body { 
            background: #0a0a0a; 
            color: #00ff41; 
            font-family: monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        
        #game-box { 
            border: 2px solid #00ff41; 
            padding: 30px; 
            border-radius: 10px; 
            text-align: center; 
            box-shadow: 0 0 20px #00ff4133; 
            background: #111; 
            width: 90%;
            max-width: 400px;
        }

        #click-btn { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 20px 0; 
            border-radius: 5px; 
            transition: 0.1s; 
            width: 100%;
            white-space: pre; /* Necessário para manter o formato do boneco ASCII */
            line-height: 1.2;
        }

        #click-btn:active { transform: scale(0.95); }
        
        .stat { font-size: 24px; margin-bottom: 10px; }
        
        .shop { 
            margin-top: 10px; 
            border-top: 1px solid #333; 
            padding-top: 20px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button.upgrade { 
            background: #222; 
            color: #00ff41; 
            border: 1px solid #00ff41; 
            padding: 12px; 
            cursor: pointer; 
            width: 100%; 
            text-align: left; 
            margin: 0; 
        }

        button.upgrade:disabled { 
            color: #444; 
            border-color: #444; 
            cursor: not-allowed; 
        }
    </style>
</head>
<body>

    <div id="game-box">
        <div class="stat">Dados: <span id="score">0</span></div>
        <div style="color: #888">DPS: <span id="dps">0</span></div>
        
        <button id="click-btn">
    (⌐■_■)
   <|  █  |>
    /   \
 [ MINERAR ]
        </button>

        <div class="shop">
            <button class="upgrade" id="up1" onclick="buy('up1', 1, 'c')">Upgrade CPU (+1 clique) - Custo: <span id="cost-up1">10</span></button>
            <button class="upgrade" id="up2" onclick="buy('up2', 1, 'a')">Script Auto (+1/s) - Custo: <span id="cost-up2">50</span></button>
            <button class="upgrade" id="up3" onclick="buy('up3', 10, 'a')">IA Avançada (+10/s) - Custo: <span id="cost-up3">500</span></button>
        </div>

        <button onclick="reset()" style="margin-top:30px; background:none; border:none; color:#444; cursor:pointer; font-size: 12px;">Resetar Progresso</button>
    </div>

    <script>
        let data = Number(localStorage.getItem('data')) || 0;
        let dps = Number(localStorage.getItem('dps')) || 0;
        let perClick = Number(localStorage.getItem('perClick')) || 1;

        // Armazena os custos atuais para que eles aumentem progressivamente
        let costs = JSON.parse(localStorage.getItem('costs')) || {
            up1: 10,
            up2: 50,
            up3: 500
        };

        const scoreEl = document.getElementById('score');
        const dpsEl = document.getElementById('dps');

        function update() {
            scoreEl.innerText = Math.floor(data);
            dpsEl.innerText = dps;
            
            // Atualiza os valores de custo na tela
            document.getElementById('cost-up1').innerText = Math.floor(costs.up1);
            document.getElementById('cost-up2').innerText = Math.floor(costs.up2);
            document.getElementById('cost-up3').innerText = Math.floor(costs.up3);

            // Verifica se o jogador tem saldo para cada upgrade
            document.getElementById('up1').disabled = data < costs.up1;
            document.getElementById('up2').disabled = data < costs.up2; 
            document.getElementById('up3').disabled = data < costs.up3;
            
            save();
        }

        document.getElementById('click-btn').onclick = () => {
            data += perClick;
            update();
        };

        // Função buy ajustada para lidar com custos dinâmicos
        function buy(upgradeId, bonus, type) {
            let currentCost = costs[upgradeId];
            
            if (data >= currentCost) {
                data -= currentCost;
                
                if (type === 'c') {
                    perClick += bonus;
                } else {
                    dps += bonus;
                }

                // Aumenta o custo em 50% para a próxima compra
                costs[upgradeId] = Math.ceil(currentCost * 1.5);
                
                update();
            }
        }

        function save() {
            localStorage.setItem('data', data);
            localStorage.setItem('dps', dps);
            localStorage.setItem('perClick', perClick);
            localStorage.setItem('costs', JSON.stringify(costs));
        }

        function reset() {
            if(confirm("Deseja mesmo resetar?")) {
                localStorage.clear();
                location.reload();
            }
        }

        setInterval(() => {
            data += dps / 10;
            update();
        }, 100);

        update();
    </script>
</body>
</html>
