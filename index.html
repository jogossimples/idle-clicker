<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Miner 2026</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5263437063771609" crossorigin="anonymous"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff41; 
            font-family: monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        
        #game-box { 
            border: 2px solid #00ff41; 
            padding: 30px; 
            border-radius: 10px; 
            text-align: center; 
            box-shadow: 0 0 20px #00ff4133; 
            background: #111; 
            width: 90%;
            max-width: 400px;
        }

        #click-btn { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 20px 0; 
            border-radius: 5px; 
            transition: 0.1s; 
            width: 100%;
            white-space: pre; 
            line-height: 1.2;
        }

        #click-btn:active { transform: scale(0.95); }
        
        .stat { font-size: 24px; margin-bottom: 10px; }
        
        .shop { 
            margin-top: 10px; 
            border-top: 1px solid #333; 
            padding-top: 20px; 
            display: flex;
            flex-direction: column; 
            gap: 10px;
        }

        button.upgrade { 
            background: #222; 
            color: #00ff41; 
            border: 1px solid #00ff41; 
            padding: 12px; 
            cursor: pointer; 
            width: 100%; 
            text-align: left; 
            margin: 0; 
            transition: 0.2s;
        }

        button.upgrade:disabled { 
            color: #444; 
            border-color: #444; 
            cursor: not-allowed; 
        }

        .error-flash {
            border-color: #ff0000 !important;
            color: #ff0000 !important;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="game-box">
        <div class="stat">Dados: <span id="score">0</span></div>
        <div style="font-size: 14px; margin-bottom: 5px;">Cliques: <span id="click-count">0</span></div>
        <div style="color: #888">DPS: <span id="dps">0</span></div>
        
        <button id="click-btn">
    (⌐■_■)
   <|  █  |>
    /   \
 [ MINERAR ]
        </button>

        <div class="shop">
            <button class="upgrade" id="up1" onclick="buy('up1', 1, 'c')">Upgrade CPU (+1 clique) - Custo: <span id="cost-up1">10</span></button>
            <button class="upgrade" id="up2" onclick="buy('up2', 1, 'a')">Script Auto (+1/s) - Custo: <span id="cost-up2">50</span></button>
            <button class="upgrade" id="up3" onclick="buy('up3', 10, 'a')">IA Avançada (+10/s) - Custo: <span id="cost-up3">500</span></button>
        </div>

        <div class="shop" style="border-top: 1px solid #00ff41;">
            <p style="margin: 10px 0;">RANKING GLOBAL</p>
            <input type="text" id="playerName" placeholder="Apelido..." oninput="saveName()" style="background:#222; color:#00ff41; border:1px solid #00ff41; padding:5px; width:90%; margin-bottom:5px;">
            <div id="displayID" style="font-size: 9px; color: #444; margin-bottom: 10px;">ID: Carregando...</div>
            
            <div id="adminPanel" style="display:none; margin-top:10px; padding:10px; border:1px solid #ff0000; color:#ff0000;">
                <p>PAINEL ADMIN</p>
                <button onclick="addDados(10000)">Ganhar 10k Dados</button>
            </div>

            <div id="skinSystem" style="margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                <button class="upgrade" onclick="girarSkins()">Loja de Skins (20k Dados)</button>
                <div id="inventario" style="margin-top:10px; font-size:11px; color:#fff;"></div>
            </div>

            <ul id="rankingList" style="list-style:none; padding:0; font-size:12px; color:#aaa; margin-top:10px;"><li>Carregando...</li></ul>
        </div>

        <button onclick="reset()" style="margin-top:30px; background:none; border:none; color:#444; cursor:pointer; font-size: 12px;">Resetar Progresso</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCH2EmnM_n2_whLGQaTx3bMRfvSLjp2YeA",
            authDomain: "idle-clicker-hacker.firebaseapp.com",
            projectId: "idle-clicker-hacker",
            storageBucket: "idle-clicker-hacker.firebasestorage.app",
            messagingSenderId: "367062112995",
            appId: "1:367062112995:web:b88185dad749a3f76403d6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let data = Number(localStorage.getItem('data')) || 0;
        let dps = Number(localStorage.getItem('dps')) || 0;
        let perClick = Number(localStorage.getItem('perClick')) || 1;
        let totalClicks = Number(localStorage.getItem('totalClicks')) || 0;
        let totalDadosAcumulados = Number(localStorage.getItem('totalDadosAcumulados')) || 0;
        let inventory = JSON.parse(localStorage.getItem('inventory')) || ["(⌐■_■)"];
        let currentSkin = localStorage.getItem('currentSkin') || "(⌐■_■)";
        let skinMult = Number(localStorage.getItem('skinMult')) || 1;

        let playerID = localStorage.getItem('playerID');
        if (!playerID) {
            playerID = 'player_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('playerID', playerID);
        }

        const ADMIN_ID = "player_i3tk5kf4l"; 
        if (playerID === ADMIN_ID) {
            document.getElementById('adminPanel').style.display = 'block';
        }

        function addDados(valor) {
            data += valor;
            totalDadosAcumulados += valor;
            update();
        }

        let defaultName = "Henriquepgd";
        let savedName = localStorage.getItem('playerName') || defaultName;
        document.getElementById('playerName').value = savedName;
        if(!localStorage.getItem('playerName')) localStorage.setItem('playerName', defaultName);

        let costs = JSON.parse(localStorage.getItem('costs')) || { up1: 10, up2: 50, up3: 500 };

        const scoreEl = document.getElementById('score');
        const clickEl = document.getElementById('click-count');
        const dpsEl = document.getElementById('dps');
        document.getElementById('displayID').innerText = "ID: " + playerID;

        function saveName() { localStorage.setItem('playerName', document.getElementById('playerName').value); }

        function update() {
            scoreEl.innerText = Math.floor(data);
            clickEl.innerText = totalClicks;
            dpsEl.innerText = dps;
            document.getElementById('click-btn').innerText = currentSkin + "\n[ MINERAR ]";
            
            document.getElementById('cost-up1').innerText = Math.floor(costs.up1);
            document.getElementById('cost-up2').innerText = Math.floor(costs.up2);
            document.getElementById('cost-up3').innerText = Math.floor(costs.up3);

            document.getElementById('up1').disabled = data < costs.up1;
            document.getElementById('up2').disabled = data < costs.up2; 
            document.getElementById('up3').disabled = data < costs.up3;
            
            atualizarInventario();
            save();
        }

        function girarSkins() {
            if (data < 20000) return alert("Precisa de 20k dados!");
            data -= 20000;
            let rand = Math.random() * 100;
            let novaSkin, mult;
            if (rand < 5) { novaSkin = "(👑_👑)"; mult = 16; }
            else if (rand < 35) { novaSkin = "(🔥_🔥)"; mult = 8; }
            else if (rand < 85) { novaSkin = "(😎_😎)"; mult = 4; }
            else { novaSkin = "(😐_😐)"; mult = 2; }
            if (!inventory.includes(novaSkin)) inventory.push(novaSkin);
            alert("Você tirou: " + novaSkin);
            update();
        }

        function equipar(skin, mult) { currentSkin = skin; skinMult = mult; update(); }

        function atualizarInventario() {
            let div = document.getElementById('inventario');
            div.innerHTML = "Skins:";
            inventory.forEach(s => {
                let m = s === "(👑_👑)" ? 16 : s === "(🔥_🔥)" ? 8 : s === "(😎_😎)" ? 4 : 2;
                div.innerHTML += `<button onclick="equipar('${s}', ${m})">${s}</button>`;
            });
        }

        function syncData() {
            let nome = localStorage.getItem('playerName') || "Hacker";
            db.ref('rankings/' + playerID).set({ nome: nome, score: Math.floor(data), totalDados: Math.floor(totalDadosAcumulados), totalCliques: totalClicks });
            carregarRanking();
        }

        function carregarRanking() {
            db.ref('rankings/').orderByChild('score').limitToLast(5).once('value', (snapshot) => {
                let list = document.getElementById('rankingList');
                list.innerHTML = "";
                let items = [];
                snapshot.forEach(c => items.push(c.val()));
                items.sort((a, b) => b.score - a.score).forEach((item, i) => {
                    let medalha = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}º`;
                    list.innerHTML += `<li>${medalha} ${item.nome}: ${Math.floor(item.totalDados || 0)} dados</li>`;
                });
            });
        }

        document.getElementById('click-btn').onclick = () => {
            data += (perClick * skinMult);
            totalClicks += 1;
            totalDadosAcumulados += (perClick * skinMult);
            update();
        };

        function buy(id, bonus, type) {
            let currentCost = costs[id];
            let btn = document.getElementById(id);
            if (data >= currentCost) {
                data -= currentCost;
                if (type === 'c') perClick += bonus; else dps += bonus;
                costs[id] = Math.ceil(currentCost * 1.5);
                update();
            } else {
                btn.classList.add('error-flash');
                setTimeout(() => btn.classList.remove('error-flash'), 300);
            }
        }

        function save() {
            localStorage.setItem('data', data); localStorage.setItem('dps', dps); localStorage.setItem('perClick', perClick);
            localStorage.setItem('totalClicks', totalClicks); localStorage.setItem('totalDadosAcumulados', totalDadosAcumulados);
            localStorage.setItem('costs', JSON.stringify(costs)); localStorage.setItem('inventory', JSON.stringify(inventory));
            localStorage.setItem('currentSkin', currentSkin); localStorage.setItem('skinMult', skinMult);
        }

        function reset() { if(confirm("Deseja mesmo resetar?")) { localStorage.clear(); location.reload(); } }

        setInterval(() => { data += (dps / 10); totalDadosAcumulados += (dps / 10); update(); }, 100);
        setInterval(syncData, 60000);
        carregarRanking();
        update();
    </script>
</body>
</html>
